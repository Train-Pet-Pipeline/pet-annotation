# Standard CI — pet-annotation v2.0.0
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  repository_dispatch:
    types: [schema-updated]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install pet-schema (peer-dep)
        run: pip install 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v3.3.0'

      - name: Install pet-infra (peer-dep)
        run: pip install 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.6.0'

      - name: Install pet-annotation (editable, no-deps)
        run: pip install -e . --no-deps

      - name: Install dev extras
        run: pip install -e ".[dev]"

      - name: Assert peer versions (§11.4)
        run: |
          python -c "import importlib.metadata; v=importlib.metadata.version('pet-schema'); assert v=='3.3.0', v"
          python -c "import importlib.metadata; v=importlib.metadata.version('pet-infra'); assert v=='2.6.0', v"

      - name: Lint
        run: ruff check src/ tests/ && mypy src/

      - name: Detect GPU
        id: gpu
        run: |
          if python -c "import torch; assert torch.cuda.is_available()" 2>/dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Test
        run: |
          if [ "${{ steps.gpu.outputs.available }}" = "true" ]; then
            pytest tests/ -v --tb=short
          else
            pytest tests/ -v --tb=short -m "not gpu"
          fi
