database:
  path: "/data/pet-data/pet_data.db"
  data_root: "/data/pet-data"
  busy_timeout_ms: 10000

annotation:
  batch_size: 16
  max_concurrent: 50
  max_daily_tokens: 10_000_000
  review_sampling_rate: 0.15
  low_confidence_threshold: 0.70
  primary_model: "qwen2.5-vl-72b"
  schema_version: "1.0"
  modality_default: vision
  # pet-data read path (read-only; used by orchestrator to ingest pending frames)
  pet_data_db_path: "/data/pet-data/pet_data.db"

models:
  qwen2.5-vl-72b:
    provider: "openai_compat"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen2.5-vl-72b-instruct"
    accounts:
      - key_env: "QWEN_API_KEY_1"
        rpm: 60
        tpm: 100000
      - key_env: "QWEN_API_KEY_2"
        rpm: 60
        tpm: 100000
    timeout: 60
    max_retries: 3

  doubao-vision:
    provider: "doubao"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    model_name: "doubao-vision-pro-32k"
    accounts:
      - key_env: "DOUBAO_API_KEY_1"
        rpm: 30
        tpm: 50000
    timeout: 60
    max_retries: 3

  local-vllm:
    provider: "vllm"
    base_url: "http://localhost:8000/v1"
    model_name: "Qwen/Qwen2.5-VL-72B-Instruct"
    accounts:
      - key_env: ""
        rpm: 999
        tpm: 999999
    timeout: 120
    max_retries: 2

llm:
  annotators: []  # default: no LLMs configured. Override per experiment.
  # Example populated config:
  # annotators:
  #   - id: "qwen25-vl-72b"
  #     provider: "vllm"
  #     base_url: "http://localhost:8000"
  #     model_name: "Qwen/Qwen2.5-VL-72B-Instruct"
  #     temperature: 0.1
  #     max_tokens: 2048
  #     api_key: ""  # empty = no auth header
  #   - id: "doubao-seed-2-0-mini"
  #     provider: "doubao"
  #     base_url: "https://ark.cn-beijing.volces.com/api/v3"
  #     model_name: "doubao-seed-2-0-mini-260215"
  #     temperature: 0.1
  #     max_tokens: 2048
  #     api_key: ""
  #     extra_payload:
  #       thinking: {type: disabled}  # disable Doubao reasoning mode (~6x speedup)
  batch_size: 10
  max_concurrent: 4

classifier:
  annotators: []  # default: no classifiers configured. Override per experiment.
  # Example populated config:
  # annotators:
  #   - id: "feeding-activity-v1"
  #     plugin: "audio_cnn_classifier"
  #     model_path: "/models/feeding_cnn_v1.pt"
  #     device: "cpu"
  #     extra_params: {}
  batch_size: 16
  max_concurrent: 2

rule:
  annotators: []  # default: no rules configured. Override per experiment.
  # Example populated config:
  # annotators:
  #   - id: "night-scene-rule"
  #     plugin: "brightness_rule"
  #     rule_id: "brightness_lt_0.3"
  #     extra_params: {threshold: 0.3}
  batch_size: 50
  max_concurrent: 8

human:
  annotators: []  # default: no human annotators configured. Override per experiment.
  # Example populated config:
  # annotators:
  #   - id: "ls-project-1"
  #     ls_base_url: "http://localhost:8080"
  #     ls_project_id: 1
  #     ls_api_token_env: "LABEL_STUDIO_TOKEN"  # env var name (not the token itself)
  #     annotation_template: "default"
  batch_size: 50

quality:
  anomaly_threshold: 0.3

dpo:
  min_pairs_per_release: 500

dvc:
  remote: "local"
  remote_path: "/data/dvc-cache"
