database:
  path: "/data/pet-data/pet_data.db"
  data_root: "/data/pet-data"

annotation:
  batch_size: 16
  max_concurrent: 50
  max_daily_tokens: 10_000_000
  review_sampling_rate: 0.15
  low_confidence_threshold: 0.70
  primary_model: "qwen2.5-vl-72b"
  schema_version: "1.0"

models:
  qwen2.5-vl-72b:
    provider: "openai_compat"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen2.5-vl-72b-instruct"
    accounts:
      - key_env: "QWEN_API_KEY_1"
        rpm: 60
        tpm: 100000
      - key_env: "QWEN_API_KEY_2"
        rpm: 60
        tpm: 100000
    timeout: 60
    max_retries: 3

  doubao-vision:
    provider: "doubao"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    model_name: "doubao-vision-pro-32k"
    accounts:
      - key_env: "DOUBAO_API_KEY_1"
        rpm: 30
        tpm: 50000
    timeout: 60
    max_retries: 3

  local-vllm:
    provider: "vllm"
    base_url: "http://localhost:8000/v1"
    model_name: "Qwen/Qwen2.5-VL-72B-Instruct"
    accounts:
      - key_env: ""
        rpm: 999
        tpm: 999999
    timeout: 120
    max_retries: 2

dpo:
  min_pairs_per_release: 500

dvc:
  remote: "local"
  remote_path: "/data/dvc-cache"
