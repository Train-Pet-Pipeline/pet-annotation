defaults:
  - /_global_/defaults
  - /dataset@_global_.dataset: llm_annotations
  - _self_

recipe:
  recipe_id: pet_annotation_llm
  description: "pet-annotation smoke recipe — loads the llm_annotations dataset plugin"
  scope: single_repo
  owner_repo: pet-annotation
  schema_version: "2.0.0"
  stages:
    - name: load
      component_registry: evaluators
      component_type: pet_infra.noop_evaluator
      inputs:
        dataset:
          ref_type: dataset
          ref_value: ${dataset.type}
      config_path: experiment/pet_annotation_vision
      depends_on: []
  variations: []
  produces: []
  default_storage: local
  required_plugins:
    - pet_annotation
